<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Thread Ops</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <aside id="controlPanel" class="control-panel" aria-label="Dashboard controls">
      <header class="panel-header">
        <button id="panelToggle" class="menu-button" type="button" aria-expanded="true" aria-controls="controlPanel" aria-label="Collapse controls" data-tooltip="Collapse controls" title="Collapse controls">
          <span aria-hidden="true"></span>
        </button>
        <div class="panel-title">
          <h1>Thread Ops</h1>
          <p id="connectionState">Live</p>
        </div>
      </header>

      <div class="panel-body">
        <section class="panel-section top-actions" aria-label="Dashboard actions">
          <label class="search" data-tooltip="Filter visible threads by title, prompt, project, agent, or id" title="Filter visible threads by title, prompt, project, agent, or id">
            <span>Search</span>
            <input id="search" type="search" placeholder="thread, project, prompt, id" autocomplete="off" />
          </label>
          <button id="focusMode" type="button" aria-pressed="false" data-tooltip="Hide quiet older threads unless they need review" title="Hide quiet older threads unless they need review">Focus</button>
          <button id="refresh" type="button" data-tooltip="Reload local Codex thread data now" title="Reload local Codex thread data now">Refresh</button>
        </section>

        <section class="panel-section metric-list" aria-label="Dashboard status">
          <div class="metric-row live">
            <span class="pulse" aria-hidden="true"></span>
            <span id="updatedAt">--</span>
          </div>
          <div class="metric-row"><span>Running</span><strong id="runningThreads">0</strong></div>
          <div class="metric-row"><span>Unread</span><strong id="unreadThreads">0</strong></div>
          <div class="metric-row"><span>Recent</span><strong id="recentThreads">0</strong></div>
          <div class="metric-row"><span>Risk</span><strong id="riskThreads">0</strong></div>
          <span id="completeThreads" hidden>0</span>
          <span id="todayThreads" hidden>0</span>
          <span id="doneThreads" hidden>0</span>
        </section>

        <section class="panel-section toolbar" aria-label="Board filters">
          <div class="toolbar-left">
            <div>
              <p class="eyebrow">Quick Filters</p>
              <div id="quickFilters" class="segmented"></div>
            </div>
            <div>
              <p class="eyebrow">Statuses</p>
              <div id="statusFilters" class="segmented compact"></div>
            </div>
          </div>
          <label class="select-wrap" data-tooltip="Choose how cards are ordered inside columns" title="Choose how cards are ordered inside columns">
            <span>Sort</span>
            <select id="sortMode">
              <option value="priority">Status priority</option>
              <option value="updated">Recently updated</option>
              <option value="running">Longest running</option>
              <option value="risk">Risk first</option>
            </select>
          </label>
          <label class="toggle" data-tooltip="Hide the Done column and older completed threads" title="Hide the Done column and older completed threads">
            <input id="hideDone" type="checkbox" />
            <span>Hide Done</span>
          </label>
        </section>
      </div>
    </aside>

    <main class="shell">
      <header class="board-topbar">
        <div>
          <strong>Board</strong>
          <span id="boardSummary">Loading local Codex threads...</span>
        </div>
        <p id="activeFilters" class="active-filters">All threads</p>
      </header>

      <section id="board" class="board" aria-label="Codex thread board"></section>
    </main>

    <aside id="detailDrawer" class="detail-drawer" hidden aria-label="Thread details">
      <header>
        <div>
          <p id="detailKicker" class="eyebrow">Thread</p>
          <h2 id="detailTitle"></h2>
          <p id="detailSubtitle"></p>
        </div>
        <button id="closeDetail" type="button" aria-label="Close details">Close</button>
      </header>
      <div id="detailContent" class="detail-content"></div>
    </aside>

    <template id="columnTemplate">
      <section class="column">
        <header>
          <div>
            <h2></h2>
            <p></p>
          </div>
          <span class="count">0</span>
        </header>
        <div class="cards"></div>
      </section>
    </template>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-main">
          <div class="card-title-row">
            <div>
              <h3></h3>
              <p class="thread-id"></p>
            </div>
            <span class="status-dot" aria-hidden="true"></span>
          </div>
          <p class="prompt"></p>
        </div>
        <div class="meta-grid"></div>
        <div class="badges"></div>
        <div class="child-summary"></div>
        <footer>
          <time></time>
        </footer>
      </article>
    </template>

    <div id="cardMenu" class="context-menu" hidden role="menu" aria-label="Thread actions">
      <button type="button" data-action="details" role="menuitem">Details</button>
      <button type="button" data-action="open" role="menuitem">Open in Codex</button>
      <button type="button" data-action="mark-read" role="menuitem">Mark as Read</button>
      <button type="button" data-action="mark-family-read" role="menuitem">Mark Thread + Subagents Read</button>
      <hr />
      <button type="button" data-action="copy-id" role="menuitem">Copy ID</button>
      <button type="button" data-action="copy-link" role="menuitem">Copy Codex Link</button>
      <button type="button" data-action="copy-title" role="menuitem">Copy Title</button>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
