<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentQueue</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="timeline-panel-collapsed">
    <aside id="controlPanel" class="control-panel" aria-label="Dashboard controls">
      <header class="panel-header">
        <div class="panel-title">
          <img src="/agentqueue-logo.png" alt="" />
          <div>
            <h1>AgentQueue</h1>
            <p>Thread monitor</p>
          </div>
        </div>
        <button id="panelToggle" class="menu-button" type="button" aria-expanded="true" aria-controls="controlPanel" aria-label="Collapse controls" title="Collapse controls">
          <span aria-hidden="true"></span>
        </button>
      </header>

      <div class="panel-body">
        <section class="panel-section metric-list" aria-label="Dashboard status">
          <div class="panel-section-header">
            <p class="eyebrow">State</p>
            <span id="updatedAt">--</span>
          </div>
          <div class="metric-row metric-running"><span>Running</span><strong id="runningThreads">0</strong></div>
          <div class="metric-row metric-unread"><span>Unread</span><strong id="unreadThreads">0</strong></div>
          <div class="metric-row"><span>Recent</span><strong id="recentThreads">0</strong></div>
          <div class="metric-row metric-risk"><span>Risk</span><strong id="riskThreads">0</strong></div>
          <span id="completeThreads" hidden>0</span>
          <span id="todayThreads" hidden>0</span>
          <span id="doneThreads" hidden>0</span>
        </section>

        <section class="panel-section top-actions" aria-label="Dashboard actions">
          <div class="panel-section-header">
            <p class="eyebrow">Command</p>
          </div>
          <label class="search" title="Filter visible threads by title, prompt, project, agent, or id">
            <span>Search</span>
            <input id="search" type="search" placeholder="thread, project, prompt, id" autocomplete="off" />
          </label>
          <div class="command-actions">
            <button id="focusMode" type="button" aria-pressed="false" title="Hide quiet older threads unless they need review">Focus</button>
            <button id="refresh" type="button" title="Reload local agent thread data now">Refresh</button>
            <a class="open-link" href="/api/docs" target="_blank" rel="noreferrer" title="Open local AgentQueue API documentation">API Docs</a>
          </div>
        </section>

        <section id="updateNotice" class="panel-section update-notice" hidden aria-label="AgentQueue update">
          <div>
            <p class="eyebrow">Update</p>
            <strong id="updateTitle">Update available</strong>
            <p id="updateDetail"></p>
          </div>
          <div class="update-actions">
            <a id="updateReleaseLink" class="open-link" href="#" target="_blank" rel="noreferrer">Release</a>
            <button id="copyUpdateCommand" type="button">Copy Command</button>
            <button id="dismissUpdate" type="button">Dismiss</button>
          </div>
        </section>

        <section class="panel-section toolbar" aria-label="Board filters">
          <div class="panel-section-header">
            <p class="eyebrow">Board Controls</p>
          </div>
          <div class="sort-control">
            <label class="select-wrap" title="Choose how cards are ordered inside columns">
              <span>Sort</span>
              <select id="sortMode">
                <option value="priority">Tiered priority</option>
                <option value="updated">Activity first</option>
                <option value="running">Longest running</option>
                <option value="risk">Risk first</option>
              </select>
            </label>
            <div id="sortTiers" class="sort-tiers" aria-live="polite"></div>
          </div>
          <div class="toolbar-left">
            <div>
              <p class="eyebrow">View</p>
              <div id="viewModes" class="segmented compact"></div>
            </div>
            <div>
              <p class="eyebrow">Quick Filters</p>
              <div id="quickFilters" class="segmented"></div>
            </div>
            <div id="tagFilterSection" hidden>
              <p class="eyebrow">Tags</p>
              <div id="tagFilters" class="tag-filters"></div>
            </div>
            <div>
              <p class="eyebrow">Statuses</p>
              <div id="statusFilters" class="segmented compact"></div>
            </div>
          </div>
          <label class="toggle" title="Hide the Done column and older completed threads">
            <input id="hideDone" type="checkbox" />
            <span>Hide Done</span>
          </label>
        </section>

        <section id="usageDetail" class="panel-section usage-detail" hidden aria-label="Burndown detail"></section>

        <section class="panel-section integration-strip" aria-label="Thread webhook">
          <div>
            <p class="eyebrow">Webhook</p>
            <strong id="webhookState">Disabled</strong>
          </div>
          <button id="openWebhookSettings" type="button" title="Configure thread status webhooks">Configure</button>
        </section>
      </div>

      <div id="panelResizeHandle" class="panel-resize-handle" role="separator" aria-label="Resize controls" aria-orientation="vertical" aria-valuemin="260" aria-valuemax="460" aria-valuenow="312" tabindex="0" title="Drag to resize controls"></div>
    </aside>

    <main class="shell">
      <nav id="columnSwitcher" class="column-switcher" aria-label="Column switcher"></nav>
      <section id="board" class="board" aria-label="Agent thread board"></section>
    </main>

    <aside id="timelinePanel" class="timeline-panel" aria-label="Thread interaction timeline collapsed">
      <header class="panel-header">
        <div class="panel-title timeline-panel-title">
          <span class="panel-mark" aria-hidden="true"></span>
          <h2>Timeline</h2>
        </div>
        <button id="timelinePanelToggle" class="menu-button" type="button" aria-expanded="false" aria-controls="timelinePanel" aria-label="Expand timeline" title="Expand timeline">
          <span aria-hidden="true"></span>
        </button>
      </header>

      <div class="panel-body timeline-panel-body">
        <section id="timeline" class="timeline" aria-label="Thread interaction timeline"></section>
      </div>

      <div id="timelinePanelResizeHandle" class="panel-resize-handle timeline-panel-resize-handle" role="separator" aria-label="Resize timeline" aria-orientation="vertical" aria-valuemin="280" aria-valuemax="620" aria-valuenow="360" tabindex="0" title="Drag to resize timeline"></div>
    </aside>

    <aside id="detailDrawer" class="detail-drawer" hidden aria-label="Thread details">
      <header>
        <div>
          <p id="detailKicker" class="eyebrow">Thread</p>
          <h2 id="detailTitle"></h2>
          <p id="detailSubtitle"></p>
        </div>
        <button id="closeDetail" type="button" aria-label="Close details">Close</button>
      </header>
      <div id="detailContent" class="detail-content"></div>
    </aside>

    <div id="webhookModal" class="modal-backdrop" hidden>
      <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="webhookModalTitle">
        <header>
          <div>
            <p class="eyebrow">Integration</p>
            <h2 id="webhookModalTitle">Thread Webhook</h2>
          </div>
          <button id="closeWebhookSettings" type="button" aria-label="Close webhook settings">Close</button>
        </header>

        <form id="webhookForm" class="webhook-form">
          <div class="webhook-head">
            <div>
              <p class="eyebrow">Delivery</p>
              <strong id="webhookModalState">Disabled</strong>
            </div>
            <label class="switch" title="Enable thread status webhooks">
              <input id="webhookEnabled" type="checkbox" />
              <span>On</span>
            </label>
          </div>

          <label class="field" title="HTTP endpoint that receives status-change POST requests">
            <span>Endpoint</span>
            <input id="webhookEndpoint" type="url" placeholder="https://example.com/hook" autocomplete="off" />
          </label>

          <div class="webhook-grid">
            <label class="toggle compact" title="Send events for subagent threads">
              <input id="webhookIncludeSubagents" type="checkbox" />
              <span>Subagents</span>
            </label>
            <label class="field token-field" title="Optional HMAC signing token">
              <span>Token</span>
              <input id="webhookSigningToken" type="password" autocomplete="new-password" />
            </label>
          </div>

          <section class="webhook-group" aria-label="Webhook statuses">
            <p class="eyebrow">Status Triggers</p>
            <div class="webhook-statuses">
              <label><input type="checkbox" data-webhook-status="running" /> Running</label>
              <label><input type="checkbox" data-webhook-status="complete" /> Complete</label>
              <label><input type="checkbox" data-webhook-status="recent" /> Recent</label>
              <label><input type="checkbox" data-webhook-status="today" /> Today</label>
              <label><input type="checkbox" data-webhook-status="done" /> Done</label>
            </div>
          </section>

          <section class="webhook-group">
            <p class="eyebrow">Messages</p>
            <div class="webhook-messages">
              <label class="field">
                <span>Running</span>
                <input data-webhook-message="running" type="text" />
              </label>
              <label class="field">
                <span>Complete</span>
                <input data-webhook-message="complete" type="text" />
              </label>
              <label class="field">
                <span>Recent</span>
                <input data-webhook-message="recent" type="text" />
              </label>
              <label class="field">
                <span>Today</span>
                <input data-webhook-message="today" type="text" />
              </label>
              <label class="field">
                <span>Done</span>
                <input data-webhook-message="done" type="text" />
              </label>
              <label class="field">
                <span>Default</span>
                <input data-webhook-message="default" type="text" />
              </label>
            </div>
          </section>

          <footer class="webhook-actions">
            <button id="saveWebhook" type="submit">Save</button>
            <button id="testWebhook" type="button">Test</button>
            <span id="webhookFeedback" aria-live="polite"></span>
          </footer>
        </form>
      </section>
    </div>

    <template id="columnTemplate">
      <section class="column">
        <header>
          <div>
            <h2></h2>
            <p></p>
          </div>
          <span class="count">0</span>
        </header>
        <div class="cards"></div>
      </section>
    </template>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-header">
          <div class="card-status-line">
            <span class="status-dot" aria-hidden="true"></span>
            <span class="card-status-text"></span>
            <span class="running-spinner" title="Running thread" aria-hidden="true" hidden></span>
          </div>
          <span class="unread-indicator" hidden></span>
        </div>
        <h3></h3>
        <p class="prompt"></p>
        <div class="card-divider"></div>
        <div class="card-metadata"></div>
        <div class="badges" hidden></div>
        <div class="child-summary"></div>
        <div class="card-divider"></div>
        <div class="card-stats">
          <div>
            <span>Last Tool</span>
            <strong class="last-tool"></strong>
          </div>
          <div>
            <span>Tokens Used</span>
            <strong class="tokens-used"></strong>
          </div>
        </div>
        <div class="card-actions">
          <button class="card-open" type="button"></button>
          <button class="card-copy" type="button" aria-label="Copy thread link" title="Copy thread link"></button>
        </div>
        <time hidden></time>
      </article>
    </template>

    <div id="cardMenu" class="context-menu" hidden role="menu" aria-label="Thread actions">
      <button type="button" data-action="details" role="menuitem">Details</button>
      <div class="menu-submenu" data-menu="tags">
        <button type="button" class="submenu-trigger" data-action="tags-menu" role="menuitem" aria-haspopup="true" aria-expanded="false">
          <span>Tags</span>
          <span aria-hidden="true">></span>
        </button>
        <div id="tagSubmenu" class="context-submenu" role="menu" aria-label="Tags"></div>
      </div>
      <button type="button" data-action="open" role="menuitem">Open Thread</button>
      <button type="button" data-action="mark-read" role="menuitem">Mark as Read</button>
      <button type="button" data-action="mark-family-read" role="menuitem">Mark Thread + Subagents Read</button>
      <hr />
      <button type="button" data-action="copy-id" role="menuitem">Copy ID</button>
      <button type="button" data-action="copy-link" role="menuitem">Copy Link</button>
      <button type="button" data-action="copy-title" role="menuitem">Copy Title</button>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
